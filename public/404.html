<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found — SiteVerdict</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080a;--text:#eeedf0;--muted:#6b6b78;--gold:#c8a84b;--border:rgba(255,255,255,.06)}

body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 5%;text-align:center}
.code{font-size:4rem;font-weight:700;color:var(--gold);font-family:"Instrument Serif",serif;margin-bottom:8px}
h1{font-family:"Instrument Serif",serif;font-size:1.6rem;font-weight:400;margin-bottom:10px}
p{font-size:.84rem;color:var(--muted);max-width:420px;line-height:1.8;margin-bottom:28px}
.links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
a{background:var(--gold);color:#000;padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none}
a.sec{background:none;color:var(--muted);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="code">404</div>
