# SiteVerdict - Netlify Configuration
# Environment variables are set in Netlify UI, not here.
# Required: GOOGLE_MAPS_API_KEY, ANTHROPIC_API_KEY, DALEADS_API_KEY
# Optional: ANTHROPIC_MODEL

[build]
  publish   = "public"
  functions = "public/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/full-report"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/services"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/hot-list"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/finance"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
