# SiteVerdict — Netlify Configuration
# Environment variables are set in Netlify UI, not here.
# Required: ANTHROPIC_API_KEY, DALEADS_API_KEY
# Optional: ANTHROPIC_MODEL (default: claude-sonnet-4-5)

[build]
  publish   = "public"
  functions = "public/netlify/functions"
  # Deploy gate: skip production deploy when only internal/docs files change.
  # exit 0 = cancel build (ignore); exit non-zero = proceed (deploy).
  # Deploy ONLY when public/, functions, package*.json, netlify.toml, scripts/, predeploy, playwright, or tests change.
  ignore = """
    bash -c '
      BASE="${CACHED_COMMIT_REF:-}"; HEAD="${COMMIT_REF:-HEAD}";
      if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then echo proceed:no-base; exit 1; fi;
      CHANGED="$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)";
      if [ -z "$CHANGED" ]; then echo proceed:no-changes; exit 1; fi;
      TRIGGER="^(public/|netlify/functions/|public/netlify/functions/|package\\.json$|package-lock\\.json$|netlify\\.toml$|scripts/predeploy\\.js$|scripts/|playwright\\.config\\.js$|tests/)";
      if echo "$CHANGED" | grep -qE "$TRIGGER"; then echo proceed:public-change; exit 1; fi;
      echo skip:internal-only; exit 0;
    '
  """

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Render test page: allow same-origin iframe (used by deploy-check.html only)
[[headers]]
  for = "/sitecheck-render-test.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"
