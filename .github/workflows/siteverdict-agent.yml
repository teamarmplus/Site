name: SiteVerdict Claude Agent - Manual

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: siteverdict-claude-agent
  cancel-in-progress: true

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run release check first
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run release-check

      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            You are SiteVerdict Claude Agent.

            This is a diagnostic run only.

            Do not edit files.
            Do not create commits.
            Do not create PRs.
            Do not deploy.
            Do not run extra tests.

            Read only:
            - RELEASE_STATUS.md
            - AGENT_QUEUE.md
            - FOUNDER_ACTIONS.md

            Output only:
            1. Current release status
            2. First unblocked task you would choose next
            3. Any founder action needed
            4. Final line: DIAGNOSTIC COMPLETE

            Keep response short.
          claude_args: |
            --max-turns 15
            
