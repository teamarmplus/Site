name: SiteVerdict Claude Agent - Manual

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: siteverdict-claude-agent
  cancel-in-progress: true

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run release check first
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run release-check

      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            You are SiteVerdict Autonomous Operating Agent.

            This is a safe first-run agent.

            Do only ONE small task.

            Read:
            - CLAUDE.md
            - RELEASE_STATUS.md
            - AGENT_QUEUE.md
            - FOUNDER_ACTIONS.md
            - docs/NATIONAL_DATA_ROADMAP.md

            Choose the first unblocked P1 or P2 task.

            Rules:
            - Do not deploy production.
            - Do not push directly to main.
            - Do not create a GitHub-ready zip.
            - Do not expose secrets.
            - Do not change business model.
            - Do not add raw data to public/.
            - Do not make large code changes.
            - Keep changes under 3 files.
            - If blocked, update FOUNDER_ACTIONS.md and stop.
            - If no safe task exists, update DAILY_LOG.md and stop.

            Required:
            1. Run npm run release-check before changes.
            2. Make one tiny safe improvement only.
            3. Run npm run release-check after changes.
            4. If tests fail, revert your own change and write NOT_READY_REPORT.md.
            5. End with one of:
               - READY PR CREATED
               - BLOCKED BUT CONTINUED
               - NOT READY

            This is a safety test. Small success is better than big risky work.
          claude_args: |
            --max-turns 25
